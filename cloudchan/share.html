<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CloudChan 分享页面 - 白色水晶风格 Web3 个人网盘">
    <title>CloudChan - 分享</title>

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- 样式 -->
    <link rel="stylesheet" href="style.css?v=2.2.2">

    <style>
        .share-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
        }

        .share-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        .share-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow:
                0 8px 32px rgba(255, 255, 255, 0.5),
                0 2px 8px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .share-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .share-header h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .share-header p {
            margin: 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .share-info {
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .share-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .share-info-row:last-child {
            border-bottom: none;
        }

        .share-info-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .share-info-value {
            font-size: 14px;
            color: #1e293b;
            font-weight: 600;
        }

        .share-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .share-actions .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .share-actions .btn i {
            font-size: 16px;
        }

        .share-actions .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .share-actions .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .share-actions .btn-primary:active {
            transform: translateY(0);
        }

        .share-actions .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .share-actions .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .share-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        .share-footer p {
            margin: 0;
            font-size: 12px;
            color: #94a3b8;
        }

        .share-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .share-footer a:hover {
            text-decoration: underline;
        }

        .share-error {
            text-align: center;
            padding: 60px 20px;
        }

        .share-error-icon {
            font-size: 64px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .share-error h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #1e293b;
        }

        .share-error p {
            margin: 0 0 20px 0;
            font-size: 14px;
            color: #64748b;
        }

        .share-loading {
            text-align: center;
            padding: 60px 20px;
        }

        .share-loading-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .share-loading h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #1e293b;
        }

        .share-loading p {
            margin: 0;
            font-size: 14px;
            color: #64748b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="share-page">
        <div class="share-container" id="shareContainer">
            <!-- 加载状态 -->
            <div id="shareLoading" class="share-loading">
                <div class="share-loading-icon">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                </div>
                <h2>加载分享信息...</h2>
                <p>正在获取文件详情，请稍候</p>
            </div>

            <!-- 错误状态 -->
            <div id="shareError" class="share-error" style="display: none;">
                <div class="share-error-icon">
                    <i class="fa-solid fa-exclamation-circle"></i>
                </div>
                <h2 id="shareErrorTitle">分享已失效</h2>
                <p id="shareErrorMessage">该分享链接已过期或被删除</p>
                <a href="/" class="btn btn-primary">
                    <i class="fa-solid fa-home"></i>
                    返回首页
                </a>
            </div>

            <!-- 分享内容 -->
            <div id="shareContent" class="share-card" style="display: none;">
                <div class="share-header">
                    <h1><i class="fa-solid fa-share-nodes"></i> 文件分享</h1>
                    <p id="shareExpiry">有效期至: -</p>
                </div>

                <div class="share-info">
                    <div class="share-info-row">
                        <span class="share-info-label">文件名</span>
                        <span class="share-info-value" id="shareFileName">-</span>
                    </div>
                    <div class="share-info-row">
                        <span class="share-info-label">文件大小</span>
                        <span class="share-info-value" id="shareFileSize">-</span>
                    </div>
                    <div class="share-info-row">
                        <span class="share-info-label">CID</span>
                        <span class="share-info-value" id="shareCid" style="font-family: monospace;">-</span>
                    </div>
                </div>

                <div class="share-actions">
                    <button class="btn btn-primary" id="downloadBtn">
                        <i class="fa-solid fa-download"></i>
                        下载文件
                    </button>
                    <button class="btn btn-secondary" id="copyCidBtn">
                        <i class="fa-solid fa-copy"></i>
                        复制 CID
                    </button>
                </div>

                <div class="share-footer">
                    <p>由 <a href="/">CloudChan</a> 提供支持 | 基于 IPFS 去中心化存储</p>
                </div>
            </div>
        </div>
    </div>

    <script src="share.js?v=2.2.2"></script>
</body>
</html>
